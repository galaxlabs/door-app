version: "3.9"

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: door_db
      POSTGRES_USER: door_user
      POSTGRES_PASSWORD: door_secret
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./door_backend
    command: >
      sh -c "python manage.py migrate &&
             daphne -b 0.0.0.0 -p 8000 config.asgi:application"
    volumes:
      - ./door_backend:/app
    ports:
      - "8000:8000"
    env_file:
      - ./door_backend/.env
    depends_on:
      - db
      - redis

  celery:
    build:
      context: ./door_backend
    command: celery -A config worker -l info
    volumes:
      - ./door_backend:/app
    env_file:
      - ./door_backend/.env
    depends_on:
      - db
      - redis

  celery-beat:
    build:
      context: ./door_backend
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - ./door_backend:/app
    env_file:
      - ./door_backend/.env
    depends_on:
      - db
      - redis

volumes:
  pgdata:
